# =============================================================================
# InferenceService — Gemma 3 270M (7 replicas, time-sliced T4)
#
# minReplicas: 7 / maxReplicas: 7 — pins exactly 7 pods, one per virtual GPU.
# Each pod requests nvidia.com/gpu: "1" (one time-sliced virtual GPU).
# With 7 virtual GPUs per node (from time-slicing-config), the scheduler
# places all 7 pods on the same physical T4 node.
#
# storageUri is set by the connection-isvc webhook (RHODS operator) when the
# connection secret uses connection-type-protocol: uri and has a URI key.
# The webhook reads the URI value → sets storageUri on the IS spec.
# The ODH pod webhook then injects the secret's AWS_* keys as direct value:
# env vars into every pod container, giving the storage-initializer MinIO
# credentials without secretKeyRef (avoiding the env[2] conflict under
# reinvocationPolicy: IfNeeded).
# Note: storage.key was tried first (KServe native) but the connection-isvc
# webhook strips it regardless of whether connections annotation is present.
# storageUri alone is also stripped when the connection type is s3 (broken
# path in RHOAI 3.4). Only connection-type-protocol: uri reliably sets it.
#
# The label opendatahub.io/dashboard: "true" makes this InferenceService
# visible in the RHOAI Dashboard under the time-slicing project.
# =============================================================================
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: gemma-270m
  namespace: time-slicing
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
    networking.kserve.io/visibility: exposed
    app: gemma-270m
  annotations:
    openshift.io/display-name: "Gemma 3 270M (7× time-sliced T4)"
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/stop: "false"
    opendatahub.io/connections: s3-data-connection
    opendatahub.io/connection-path: gemma-3-270m
spec:
  predictor:
    minReplicas: 5
    maxReplicas: 5
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-cuda-runtime
      storageUri: s3://gemma-models/gemma-3-270m
      resources:
        requests:
          cpu: "100m"
          memory: "4Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "2"
          memory: "8Gi"
          nvidia.com/gpu: "1"
